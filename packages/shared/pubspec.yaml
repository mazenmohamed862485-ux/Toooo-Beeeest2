name: shared
description: "الكود المشترك بين TO Best و TO Best Management — domain, data, infrastructure, design, utils"
version: 1.0.0
publish_to: none

environment:
  sdk: ">=3.3.0 <4.0.0"
  flutter: ">=3.44.0"

dependencies:
  flutter:
    sdk: flutter

  # ── State Management ──────────────────────────────────────
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.3
  flutter_hooks: ^0.20.5
  hooks_riverpod: ^2.5.1

  # ── Local DB ─────────────────────────────────────────────
  isar: ^3.1.0+1
  isar_flutter_libs: ^3.1.0+1
  path_provider: ^2.1.3

  # ── HTTP ─────────────────────────────────────────────────
  dio: ^5.4.1

  # ── Secure Storage ───────────────────────────────────────
  flutter_secure_storage: ^9.0.0

  # ── Navigation ───────────────────────────────────────────
  go_router: ^14.2.0

  # ── Video ────────────────────────────────────────────────
  video_player: ^2.8.6

  # ── Notifications ────────────────────────────────────────
  flutter_local_notifications: ^17.1.2

  # ── Auth ─────────────────────────────────────────────────
  google_sign_in: ^6.2.1

  # ── AI ───────────────────────────────────────────────────
  google_generative_ai: ^0.4.3

  # ── Images ───────────────────────────────────────────────
  image_picker: ^1.1.2
  cached_network_image: ^3.3.1

  # ── Health ───────────────────────────────────────────────
  pedometer: ^4.0.2

  # ── Background ───────────────────────────────────────────
  workmanager: ^0.6.0

  # ── Connectivity ─────────────────────────────────────────
  connectivity_plus: ^6.0.3

  # ── Typography ───────────────────────────────────────────
  google_fonts: ^6.2.1

  # ── Screen Protection ────────────────────────────────────
  flutter_windowmanager: ^0.2.0

  # ── Utilities ────────────────────────────────────────────
  equatable: ^2.0.5
  freezed_annotation: ^2.4.1
  json_annotation: ^4.9.0
  intl: ^0.19.0
  uuid: ^4.4.0
  crypto: ^3.0.3
  collection: ^1.18.0
  rxdart: ^0.27.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.10
  riverpod_generator: ^2.4.0
  isar_generator: ^3.1.0+1
  freezed: ^2.5.2
  json_serializable: ^6.8.0
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/lottie/
