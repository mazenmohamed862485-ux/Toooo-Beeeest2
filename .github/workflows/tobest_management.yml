name: Build TO Best Management APK

on:
  push:
    branches: [main, develop]
    paths:
      - 'apps/tobest_management/**'
      - 'packages/shared/**'
      - 'pubspec.yaml'
      - 'melos.yaml'
  workflow_dispatch:
    inputs:
      build_type:
        description: 'نوع البناء'
        required: true
        default: 'debug'
        type: choice
        options: [release, debug]

env:
  FLUTTER_VERSION: '3.24.5'
  JAVA_VERSION: '17'

jobs:
  build_management_apk:
    name: 🏗️ Build Management APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install Melos globally
        run: dart pub global activate melos 3.4.0

      - name: Install local Melos (required by Melos 3.x)
        run: dart pub get

      - name: Bootstrap
        run: melos bootstrap

      - name: Generate secrets.dart
        run: |
          cat > packages/shared/lib/config/secrets.dart << EOF
          // GENERATED by CI
          class AppSecrets {
            AppSecrets._();
            static const String gasBaseUrl = '${{ secrets.GAS_BASE_URL }}';
            static const String gasSecretKey = '${{ secrets.GAS_SECRET_KEY }}';
            static const String geminiApiKey = '${{ secrets.GEMINI_API_KEY }}';
          }
          EOF

      - name: Run Code Generation
        run: |
          cd packages/shared && dart run build_runner build --delete-conflicting-outputs
          cd ../../apps/tobest_management && dart run build_runner build --delete-conflicting-outputs

      - name: Analyze
        run: |
          cd apps/tobest_management
          flutter analyze --no-fatal-infos

      - name: Setup Keystore
        run: |
          if [ -n "${{ secrets.MGMT_KEYSTORE_BASE64 }}" ]; then
            echo "${{ secrets.MGMT_KEYSTORE_BASE64 }}" | base64 --decode > apps/tobest_management/android/app/tobest_mgmt.jks
            cat > apps/tobest_management/android/key.properties << EOF
          storePassword=${{ secrets.MGMT_STORE_PASSWORD }}
          keyPassword=${{ secrets.MGMT_KEY_PASSWORD }}
          keyAlias=${{ secrets.MGMT_KEY_ALIAS }}
          storeFile=tobest_mgmt.jks
          EOF
          fi

      - name: Build Debug APK
        if: github.event.inputs.build_type == 'debug' || github.event_name == 'push'
        run: |
          cd apps/tobest_management
          flutter build apk --debug

      - name: Build Release APK
        if: github.event.inputs.build_type == 'release'
        run: |
          cd apps/tobest_management
          flutter build apk --release --split-per-abi

      - name: Get Version
        id: version
        run: |
          VERSION=$(grep '^version:' apps/tobest_management/pubspec.yaml | sed 's/version: //')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "date=$(date +%Y%m%d-%H%M)" >> $GITHUB_OUTPUT

      - name: Upload Management APK
        uses: actions/upload-artifact@v4
        with:
          name: tobest-management-v${{ steps.version.outputs.version }}-${{ steps.version.outputs.date }}
          path: apps/tobest_management/build/app/outputs/flutter-apk/*.apk
          retention-days: 60
          if-no-files-found: warn

      - name: Summary
        run: |
          echo "## TO Best Management Build" >> $GITHUB_STEP_SUMMARY
          echo "- Version: ${{ steps.version.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "- Date: ${{ steps.version.outputs.date }}" >> $GITHUB_STEP_SUMMARY
