name: Build TO Best APK

on:
  push:
    branches: [main, develop]
    paths:
      - 'apps/tobest/**'
      - 'packages/shared/**'
  pull_request:
    branches: [main]
    paths:
      - 'apps/tobest/**'
      - 'packages/shared/**'
  workflow_dispatch:
    inputs:
      build_type:
        description: 'نوع البناء'
        required: true
        default: 'release'
        type: choice
        options:
          - release
          - debug

env:
  FLUTTER_VERSION: '3.44.0'
  JAVA_VERSION: '17'
  # الأسرار تُعرَّف في GitHub Secrets
  # GAS_BASE_URL, GAS_SECRET_KEY, GEMINI_API_KEY
  # KEYSTORE_BASE64, KEY_ALIAS, KEY_PASSWORD, STORE_PASSWORD

jobs:
  # ── Job 1: Code Quality ───────────────────────────────────────
  lint_and_test:
    name: 🔍 Lint & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install Melos
        run: dart pub global activate melos

      - name: Bootstrap Monorepo
        run: melos bootstrap

      - name: Run Code Generation (shared)
        run: |
          cd packages/shared
          dart run build_runner build --delete-conflicting-outputs

      - name: Run Code Generation (tobest)
        run: |
          cd apps/tobest
          dart run build_runner build --delete-conflicting-outputs

      - name: Analyze shared
        run: |
          cd packages/shared
          flutter analyze --no-fatal-infos

      - name: Analyze tobest
        run: |
          cd apps/tobest
          flutter analyze --no-fatal-infos

      - name: Run Tests
        run: |
          cd packages/shared
          flutter test --coverage || true

  # ── Job 2: Build APK ─────────────────────────────────────────
  build_apk:
    name: 🏗️ Build APK
    runs-on: ubuntu-latest
    needs: lint_and_test
    if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install Melos
        run: dart pub global activate melos

      - name: Bootstrap Monorepo
        run: melos bootstrap

      - name: Generate secrets.dart
        run: |
          cat > packages/shared/lib/config/secrets.dart << 'EOF'
          class AppSecrets {
            AppSecrets._();
            static const String gasBaseUrl = '${{ secrets.GAS_BASE_URL }}';
            static const String gasSecretKey = '${{ secrets.GAS_SECRET_KEY }}';
            static const String geminiApiKey = '${{ secrets.GEMINI_API_KEY }}';
          }
          EOF

      - name: Run Code Generation
        run: |
          cd packages/shared
          dart run build_runner build --delete-conflicting-outputs
          cd ../../apps/tobest
          dart run build_runner build --delete-conflicting-outputs

      - name: Setup Android Keystore
        if: github.event.inputs.build_type == 'release' || github.ref == 'refs/heads/main'
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > apps/tobest/android/app/tobest.jks
          cat > apps/tobest/android/key.properties << EOF
          storePassword=${{ secrets.STORE_PASSWORD }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          storeFile=tobest.jks
          EOF

      - name: Build Release APK
        if: github.event.inputs.build_type != 'debug'
        run: |
          cd apps/tobest
          flutter build apk --release \
            --obfuscate \
            --split-debug-info=.debug-info \
            --split-per-abi

      - name: Build Debug APK
        if: github.event.inputs.build_type == 'debug'
        run: |
          cd apps/tobest
          flutter build apk --debug

      - name: Get Version
        id: version
        run: |
          VERSION=$(grep '^version:' apps/tobest/pubspec.yaml | sed 's/version: //')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "date=$(date +%Y%m%d-%H%M)" >> $GITHUB_OUTPUT

      - name: Upload APK (arm64-v8a)
        uses: actions/upload-artifact@v4
        with:
          name: tobest-v${{ steps.version.outputs.version }}-${{ steps.version.outputs.date }}-arm64
          path: apps/tobest/build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
          retention-days: 30

      - name: Upload APK (armeabi-v7a)
        uses: actions/upload-artifact@v4
        with:
          name: tobest-v${{ steps.version.outputs.version }}-${{ steps.version.outputs.date }}-arm32
          path: apps/tobest/build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk
          retention-days: 30

      - name: Upload APK (x86_64 — للمحاكي)
        uses: actions/upload-artifact@v4
        with:
          name: tobest-v${{ steps.version.outputs.version }}-${{ steps.version.outputs.date }}-x86_64
          path: apps/tobest/build/app/outputs/flutter-apk/app-x86_64-release.apk
          retention-days: 14

  # ── Job 3: Notify ─────────────────────────────────────────────
  notify:
    name: 📢 Notify
    runs-on: ubuntu-latest
    needs: build_apk
    if: always()
    steps:
      - name: Summary
        run: |
          echo "## TO Best Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "- Branch: ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- Commit: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- Status: ${{ needs.build_apk.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Time: $(date)" >> $GITHUB_STEP_SUMMARY
