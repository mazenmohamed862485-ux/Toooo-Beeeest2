name: Build TO Best APK

on:
  push:
    branches: [main, develop]
    paths:
      - 'apps/tobest/**'
      - 'packages/shared/**'
      - 'pubspec.yaml'
      - 'melos.yaml'
  pull_request:
    branches: [main]
    paths:
      - 'apps/tobest/**'
      - 'packages/shared/**'
  workflow_dispatch:
    inputs:
      build_type:
        description: 'نوع البناء'
        required: true
        default: 'debug'
        type: choice
        options:
          - release
          - debug

env:
  FLUTTER_VERSION: '3.24.5'
  JAVA_VERSION: '17'

jobs:
  lint_and_test:
    name: 🔍 Lint & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install Melos globally
        run: dart pub global activate melos 3.4.0

      - name: Install local Melos (required by Melos 3.x)
        run: dart pub get

      - name: Bootstrap Monorepo
        run: melos bootstrap

      - name: Generate secrets.dart (empty values for lint)
        run: |
          cat > packages/shared/lib/config/secrets.dart << 'EOF'
          // GENERATED for CI lint — values are empty
          class AppSecrets {
            AppSecrets._();
            static const String gasBaseUrl = '';
            static const String gasSecretKey = '';
            static const String geminiApiKey = '';
          }
          EOF

      - name: Run Code Generation (shared)
        run: |
          cd packages/shared
          dart run build_runner build --delete-conflicting-outputs

      - name: Run Code Generation (tobest)
        run: |
          cd apps/tobest
          dart run build_runner build --delete-conflicting-outputs

      - name: Analyze shared
        run: |
          cd packages/shared
          flutter analyze --no-fatal-infos

      - name: Analyze tobest
        run: |
          cd apps/tobest
          flutter analyze --no-fatal-infos

      - name: Run Tests
        run: |
          cd packages/shared
          flutter test --coverage || true

  build_apk:
    name: 🏗️ Build APK
    runs-on: ubuntu-latest
    needs: lint_and_test
    if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install Melos globally
        run: dart pub global activate melos 3.4.0

      - name: Install local Melos (required by Melos 3.x)
        run: dart pub get

      - name: Bootstrap Monorepo
        run: melos bootstrap

      - name: Generate secrets.dart
        run: |
          cat > packages/shared/lib/config/secrets.dart << EOF
          // GENERATED by CI
          class AppSecrets {
            AppSecrets._();
            static const String gasBaseUrl = '${{ secrets.GAS_BASE_URL }}';
            static const String gasSecretKey = '${{ secrets.GAS_SECRET_KEY }}';
            static const String geminiApiKey = '${{ secrets.GEMINI_API_KEY }}';
          }
          EOF

      - name: Run Code Generation
        run: |
          cd packages/shared
          dart run build_runner build --delete-conflicting-outputs
          cd ../../apps/tobest
          dart run build_runner build --delete-conflicting-outputs

      - name: Setup Android Keystore
        if: github.event.inputs.build_type != 'debug'
        run: |
          if [ -n "${{ secrets.KEYSTORE_BASE64 }}" ]; then
            echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > apps/tobest/android/app/tobest.jks
            cat > apps/tobest/android/key.properties << EOF
          storePassword=${{ secrets.STORE_PASSWORD }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          storeFile=tobest.jks
          EOF
          fi

      - name: Build Debug APK
        if: github.event.inputs.build_type == 'debug' || github.event_name == 'push'
        run: |
          cd apps/tobest
          flutter build apk --debug

      - name: Build Release APK
        if: github.event.inputs.build_type == 'release'
        run: |
          cd apps/tobest
          flutter build apk --release --split-per-abi

      - name: Get Version
        id: version
        run: |
          VERSION=$(grep '^version:' apps/tobest/pubspec.yaml | sed 's/version: //')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "date=$(date +%Y%m%d-%H%M)" >> $GITHUB_OUTPUT

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: tobest-v${{ steps.version.outputs.version }}-${{ steps.version.outputs.date }}
          path: apps/tobest/build/app/outputs/flutter-apk/*.apk
          retention-days: 30
          if-no-files-found: warn

  notify:
    name: 📢 Notify
    runs-on: ubuntu-latest
    needs: build_apk
    if: always()
    steps:
      - name: Summary
        run: |
          echo "## TO Best Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "- Branch: ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- Commit: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- Status: ${{ needs.build_apk.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Time: $(date)" >> $GITHUB_STEP_SUMMARY
