name: tobest_management
description: "TO Best Management"
version: 1.0.0+1
publish_to: none

environment:
  sdk: ">=3.3.0 <4.0.0"
  flutter: ">=3.44.0"

dependencies:
  flutter:
    sdk: flutter
  shared:
    path: ../../packages/shared
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.3
  hooks_riverpod: ^2.5.1
  flutter_hooks: ^0.20.5
  go_router: ^14.2.0
  fl_chart: ^0.68.0
  intl: ^0.19.0
  image_picker: ^1.1.2
  cached_network_image: ^3.3.1
  uuid: ^4.4.0
  device_info_plus: ^10.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.10
  riverpod_generator: ^2.4.0
  flutter_lints: ^4.0.0

dependency_overrides:
  flutter_windowmanager:
    path: ../../packages/flutter_windowmanager_v2

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
