name: tobest
description: "TO Best - Flutter app for training and nutrition"
version: 1.0.0+1
publish_to: none

environment:
  sdk: ">=3.3.0 <4.0.0"
  flutter: ">=3.44.0"

dependencies:
  flutter:
    sdk: flutter
  shared:
    path: ../../packages/shared
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.3
  hooks_riverpod: ^2.5.1
  flutter_hooks: ^0.20.5
  go_router: ^14.2.0
  flutter_windowmanager: ^0.2.0
  record: ^5.1.0
  audioplayers: ^6.0.0
  image_picker: ^1.1.2
  cached_network_image: ^3.3.1
  fl_chart: ^0.68.0
  pedometer: ^4.0.2
  permission_handler: ^11.3.0
  lottie: ^3.1.0
  intl: ^0.19.0
  uuid: ^4.4.0
  device_info_plus: ^10.1.0
  share_plus: ^10.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.10
  riverpod_generator: ^2.4.0
  flutter_lints: ^4.0.0

dependency_overrides:
  record_platform_interface: ">=1.1.0 <1.6.0"
  flutter_windowmanager:
    path: ../../packages/flutter_windowmanager_v2

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/lottie/
    - assets/icons/
