// ============================================================
    // TO Best — android/app/build.gradle
    // إعدادات Android Build: minSdk 24, targetSdk 35
    // ============================================================

    plugins {
        id "com.android.application"
        id "kotlin-android"
        id "dev.flutter.flutter-gradle-plugin"
    }

    // تحميل key.properties إذا كان موجوداً (CI/CD)
    def keystoreProperties = new Properties()
    def keystorePropertiesFile = rootProject.file('key.properties')
    if (keystorePropertiesFile.exists()) {
        keystoreProperties.load(new FileInputStream(keystorePropertiesFile))
    }

    android {
        namespace "com.tobest.app"
        compileSdk flutter.compileSdkVersion
        ndkVersion "28.2.13676358"

        compileOptions {
            coreLibraryDesugaringEnabled true
            sourceCompatibility JavaVersion.VERSION_17
            targetCompatibility JavaVersion.VERSION_17
        }

        kotlinOptions {
            jvmTarget = '17'
        }

        defaultConfig {
            applicationId "com.tobest.app"
            minSdkVersion 24
            targetSdkVersion 35
            versionCode flutter.versionCode
            versionName flutter.versionName

            // دعم RTL
            resValue "bool", "is_rtl", "true"
        }

        signingConfigs {
            release {
                if (keystorePropertiesFile.exists()) {
                    keyAlias keystoreProperties['keyAlias']
                    keyPassword keystoreProperties['keyPassword']
                    storeFile keystoreProperties['storeFile'] ?
                        file(keystoreProperties['storeFile']) : null
                    storePassword keystoreProperties['storePassword']
                }
            }
        }

        buildTypes {
            release {
                signingConfig keystorePropertiesFile.exists() ?
                    signingConfigs.release : signingConfigs.debug
                minifyEnabled true
                shrinkResources true
                proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'),
                    'proguard-rules.pro'
            }
            debug {
                applicationIdSuffix ".debug"
                versionNameSuffix "-debug"
            }
        }
    }

    flutter {
        source '../..'
    }

    dependencies {
        coreLibraryDesugaring "com.android.tools:desugar_jdk_libs:2.1.4"
    }
    